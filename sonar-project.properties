# SonarCloud configuration for auntiepypi.
#
# Test files contain patterns that are legitimate in test code but flagged as
# security hotspots in production code:
#   * tests/fixtures/fake_pypiserver.py — HTTP localhost server (S5332). Tests
#     don't need TLS; the fixture only ever serves 127.0.0.1.
#   * tests/test_actions_command.py — `os.killpg` to clean up child PIDs we
#     ourselves spawned (S4828). Not arbitrary signal injection.
#
# Excluding tests from security-hotspot scanning matches SonarCloud's standard
# guidance: scan production code for security, not test fixtures.

sonar.projectKey=agentculture_auntiepypi
sonar.organization=agentculture

sonar.sources=auntiepypi
sonar.tests=tests

# Hotspots: scan only production code.
sonar.security.hotspots.exclusions=tests/**

# Duplicates: test files often legitimately repeat fixtures/setup across cases.
sonar.cpd.exclusions=tests/**

# Coverage exclusions (we don't measure coverage on test code itself).
sonar.coverage.exclusions=tests/**,docs/**
