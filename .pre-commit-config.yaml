# Pre-commit hooks for agentpypi.
#
# Mirrors the lint chain in .github/workflows/tests.yml so locally-clean
# work doesn't fail in CI. Modeled on ../afi-cli/.pre-commit-config.yaml
# (which steward and the rest of the AgentCulture mesh share).
#
# Install once per checkout:
#   uv run pre-commit install
#
# Run on demand:
#   uv run pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-ast
      - id: detect-private-key

  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2 (check)
        description: Lint markdown (no auto-fix). Run scripts/lint-md.sh to fix.
        entry: markdownlint-cli2
        language: system
        types: [markdown]

      - id: black
        name: black
        entry: uv run black
        language: system
        types: [python]

      - id: isort
        name: isort
        entry: uv run isort
        language: system
        types: [python]

      - id: flake8
        name: flake8
        entry: uv run flake8 --config=.flake8
        language: system
        types: [python]

      - id: bandit
        name: bandit
        entry: uv run bandit -c pyproject.toml -q
        language: system
        types: [python]
        exclude: ^tests/

      - id: portability-lint
        name: portability-lint
        description: Catch absolute home paths and per-user dotfile refs in committed files.
        entry: bash .claude/skills/pr-review/scripts/portability-lint.sh
        language: system
        pass_filenames: false
        always_run: true
